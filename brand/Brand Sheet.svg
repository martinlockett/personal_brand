<svg width="680" height="668" viewBox="0 0 680 668" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Martin Lockett personal brand sheet</title>
<desc>One-page brand reference: ML monogram, wordmark, motto, colour palette with hex values, type specimen for Fraunces and Inter, and brand voice.</desc>
<defs><style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&amp;family=Inter:wght@400;500&amp;display=swap');
.serif{font-family:'Fraunces',Georgia,serif}
.serif-i{font-family:'Fraunces',Georgia,serif;font-style:italic}
