<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<base href="/ui_kits/personal-site/">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Martin Lockett</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="../../_site_bundle.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--surface-page); color: var(--text-body); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; }
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" data-presets="react">
  function App() {
    const [route, setRoute] = React.useState({ name: 'home', essayId: null });
    const go = (name) => { setRoute({ name, essayId: null }); window.scrollTo({ top: 0 }); };
    const openEssay = (id) => { setRoute({ name: 'essay', essayId: id }); window.scrollTo({ top: 0 }); };

    let screen;
    if (route.name === 'home') screen = <window.HomeScreen onOpenEssay={openEssay} onNavigate={go} />;
    else if (route.name === 'writing') screen = <window.WritingScreen onOpenEssay={openEssay} />;
    else if (route.name === 'essay') screen = <window.EssayScreen essayId={route.essayId} onBack={() => go('writing')} onOpenEssay={openEssay} />;
    else if (route.name === 'about') screen = <window.AboutScreen onNavigate={go} />;
    else if (route.name === 'contact') screen = <window.ContactScreen />;

    const active = route.name === 'essay' ? 'writing' : route.name;
    return (
      <React.Fragment>
        <window.Nav active={active} onNavigate={go} />
        {screen}
        <window.Footer onNavigate={go} />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
