<!-- @dsCard group="Spacing" viewport="700x160" name="Radii" subtitle="Restrained, paper-soft corners" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body); }
  .wrap { padding: 22px 28px; display: flex; gap: 22px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 56px; background: var(--surface-card); border: 1.5px solid var(--rule-strong); }
  .tag { font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
<div class="wrap">
  <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="tag">xs · 3</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="tag">sm · 6</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="tag">md · 10</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="tag">lg · 16</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="tag">xl · 24</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-pill);width:96px"></div><div class="tag">pill</div></div>
</div>
</body>
</html>
