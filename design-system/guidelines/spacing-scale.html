<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base · room to think" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body); }
  .wrap { padding: 22px 28px; display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { width: 22px; background: var(--slate-teal-500); border-radius: 2px 2px 0 0; }
  .tag { font-size: 11px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="wrap">
  <div class="col"><div class="bar" style="height:4px"></div><div class="tag">1·4</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="tag">2·8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="tag">3·12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="tag">4·16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="tag">5·24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="tag">6·32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="tag">7·48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="tag">8·64</div></div>
  <div class="col"><div class="bar" style="height:96px"></div><div class="tag">9·96</div></div>
</div>
</body>
</html>
