<!-- @dsCard group="Colors" viewport="700x150" name="Usage ratio" subtitle="60% Parchment · 25% Ink Navy · 10% Slate Teal · 5% Brass" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body); }
  .wrap { padding: 24px 28px; }
  .bar { display: flex; height: 56px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--rule-strong); }
  .seg { display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; }
  .legend { margin-top: 14px; font-size: 13px; color: var(--text-muted); }
  .legend b { color: var(--ink-navy-600); font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <div class="seg" style="flex:60;background:var(--parchment-50);color:var(--slate-teal-500)">60% Parchment</div>
    <div class="seg" style="flex:25;background:var(--ink-navy-600);color:var(--parchment-50)">25% Ink</div>
    <div class="seg" style="flex:10;background:var(--slate-teal-500);color:#fff">10%</div>
    <div class="seg" style="flex:5;background:var(--brass-500);color:#fff">5%</div>
  </div>
  <div class="legend"><b>Brass is a seasoning, never a base.</b> If a layout feels loud, you've used too much Brass.</div>
</div>
</body>
</html>
