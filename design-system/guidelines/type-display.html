<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body); }
  .wrap { padding: 22px 28px; display: flex; flex-direction: column; gap: 4px; }
  .label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--slate-teal-500); }
  .spec { font-family: var(--font-display); color: var(--ink-navy-600); line-height: 1.05; }
  .meta { font-size: 12px; color: var(--text-faint); }
</style>
</head>
<body>
<div class="wrap">
  <div class="label">Display · Fraunces</div>
  <div class="spec" style="font-size:52px;font-weight:600;letter-spacing:-0.01em">Be true, think deeply</div>
  <div class="spec" style="font-size:26px;font-weight:500;font-style:italic;color:var(--slate-teal-600)">Headings &amp; the wordmark</div>
  <div class="meta" style="margin-top:8px">Fraunces · 300–700 · upright &amp; italic · generous leading, short measure</div>
</div>
</body>
</html>
