<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="Display, headings & body steps in use" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body); }
  .wrap { padding: 20px 28px; display: flex; flex-direction: column; gap: 10px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .tag { font-size: 11px; color: var(--text-faint); width: 92px; flex: none; font-variant-numeric: tabular-nums; }
  .serif { font-family: var(--font-display); color: var(--ink-navy-600); line-height: 1.1; }
  .sans { font-family: var(--font-body); color: var(--graphite-700); }
</style>
</head>
<body>
<div class="wrap">
  <div class="line"><span class="tag">H1 · 44</span><span class="serif" style="font-size:44px;font-weight:600">Understand deeply</span></div>
  <div class="line"><span class="tag">H2 · 32</span><span class="serif" style="font-size:32px;font-weight:500">A considered pause</span></div>
  <div class="line"><span class="tag">H3 · 24</span><span class="serif" style="font-size:24px;font-weight:500">Selected writing</span></div>
  <div class="line"><span class="tag">Lead · 20</span><span class="sans" style="font-size:20px;font-weight:500">The observer who builds.</span></div>
  <div class="line"><span class="tag">Body · 17</span><span class="sans" style="font-size:17px">Say it plainly and precisely.</span></div>
  <div class="line"><span class="tag">Small · 15</span><span class="sans" style="font-size:15px;color:var(--text-muted)">Captions and secondary copy.</span></div>
</div>
</body>
</html>
