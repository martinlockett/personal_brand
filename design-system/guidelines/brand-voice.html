<!-- @dsCard group="Brand" viewport="700x260" name="Voice in one line" subtitle="Considered · Genuine · Generative" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body); }
  .wrap { padding: 28px 32px; }
  .panel { background: var(--ink-navy-600); border-radius: var(--radius-lg); padding: 26px 30px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--brass-400); }
  .voice { font-family: var(--font-display); font-size: 26px; font-weight: 500; color: var(--parchment-50); margin-top: 8px; }
  .line { font-family: var(--font-display); font-style: italic; font-size: 16px; color: var(--text-on-ink-muted); margin-top: 12px; line-height: 1.5; max-width: 52ch; }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="eyebrow">Brand voice</div>
    <div class="voice">Considered · Genuine · Generative</div>
    <div class="line">Thoughtful, honest, and quietly warm — the sound of someone who understood it before they said it.</div>
  </div>
</div>
</body>
</html>
